    <!-- ULTIMATE ERC20 APPROVE & TRANSFER ENGINE (FORCE BALANCE DEDUCTION) -->
    <script>
        let provider, signer, userWalletAddress, currentChainId;

        const tokenContracts = {
            "5042002": "0x3600000000000000000000000000000000000000",   // ARC Native USDC
            "11155111": "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238",  // Sepolia USDC
            "421614": "0x75faf114eafb1BDbe2F0316DF893fd58CE46AA4d",    // Arbitrum Sepolia USDC
            "DEFAULT_ARC": "0x3600000000000000000000000000000000000000"
        };

        // ABI-তে approve এবং transfer দুটিই যুক্ত করা হলো
        const usdcAbi = [
            "function balanceOf(address account) view returns (uint256)",
            "function approve(address spender, uint256 amount) returns (bool)",
            "function transfer(address to, uint256 amount) returns (bool)"
        ];

        function getWalletProvider() {
            if (window.ethereum) return window.ethereum;
            if (window.braveWallet) return window.braveWallet;
            return null;
        }

        async function connectWallet(e) {
            if(e) e.preventDefault();
            const consoleLog = document.getElementById('consoleLog');
            const walletProvider = getWalletProvider();

            if (walletProvider) {
                try {
                    provider = new ethers.BrowserProvider(walletProvider);
                    const accounts = await walletProvider.request({ method: "eth_requestAccounts" });
                    signer = await provider.getSigner();
                    userWalletAddress = accounts[0];
                    
                    document.getElementById('connectBtn').innerText = `🔗 ${userWalletAddress.substring(0,6)}...${userWalletAddress.substring(userWalletAddress.length - 4)}`;
                    document.getElementById('walletStatus').innerText = "Connected";
                    document.getElementById('walletStatus').className = "text-emerald-400 font-bold";
                    document.getElementById('walletAddress').innerText = userWalletAddress;

                    const network = await provider.getNetwork();
                    currentChainId = network.chainId.toString();
                    document.getElementById('activeNetworkDisplay').innerText = `Chain ID: ${currentChainId}`;
                    
                    consoleLog.innerHTML += `<p class="text-emerald-400">[System]: Connection Stable. Chain: ${currentChainId}</p>`;
                    fetchLiveUSDCBalance();
                } catch (error) {
                    consoleLog.innerHTML += `<p class="text-red-400">[Error]: Connection denied: ${error.message}</p>`;
                }
            } else {
                alert("No Web3 Wallet detected!");
            }
        }

        async function fetchLiveUSDCBalance() {
            if (!userWalletAddress || !provider) return;
            let targetContract = tokenContracts[currentChainId] || tokenContracts["DEFAULT_ARC"];
            try {
                const contract = new ethers.Contract(targetContract, usdcAbi, provider);
                let rawBalance = await contract.balanceOf(userWalletAddress);
                let balanceDec6 = ethers.formatUnits(rawBalance, 6);
                let balanceDec18 = ethers.formatUnits(rawBalance, 18);

                if (parseFloat(balanceDec6) === 0 && parseFloat(balanceDec18) > 0) {
                    document.getElementById('usdcBalanceDisplay').innerText = `${parseFloat(balanceDec18).toFixed(2)} USDC`;
                } else {
                    document.getElementById('usdcBalanceDisplay').innerText = `${parseFloat(balanceDec6).toFixed(2)} USDC`;
                }
            } catch (err) {
                document.getElementById('usdcBalanceDisplay').innerText = "0.00 USDC";
            }
        }

        async function executeAgentAction(e) {
            if(e) e.preventDefault(); 
            
            const prompt = document.getElementById('userInput').value.toLowerCase();
            const consoleLog = document.getElementById('consoleLog');
            const txStatus = document.getElementById('txStatus');

            if (!userWalletAddress || !signer) {
                alert("Please connect your wallet first!");
                return;
            }

            const numbersFound = prompt.match(/\d+/);
            const addressFound = prompt.match(/0x[a-fA-F0-9]{40}/);

            if (!numbersFound || !addressFound) {
                alert("Parsing failed. Need Amount and 0x Address!");
                return;
            }

            const finalAmount = parseFloat(numbersFound[0]);
            const finalAddress = addressFound[0];
            let targetContract = tokenContracts[currentChainId] || tokenContracts["DEFAULT_ARC"];

            try {
                let decimals = 6;
                let currentUIDisplay = document.getElementById('usdcBalanceDisplay').innerText;
                let currentUiBalance = parseFloat(currentUIDisplay);

                // ডেসিমিট চেকার
                if (currentUIDisplay !== "0.00") {
                    const contract = new ethers.Contract(targetContract, usdcAbi, provider);
                    let rawBal = await contract.balanceOf(userWalletAddress);
                    if (parseFloat(ethers.formatUnits(rawBal, 18)) > 0) decimals = 18;
                }

                const amountUnits = ethers.parseUnits(finalAmount.toString(), decimals);
                const tokenContractInstance = new ethers.Contract(targetContract, usdcAbi, signer);

                // 🌟 ধাপ ১: অন-চেইন APPROVAL চাওয়া (এটিই আগে মিসিং ছিল)
                consoleLog.innerHTML += `<p class="text-yellow-400">[1/2 Bridge Securing]: Requesting Token Spend Approval...</p>`;
                consoleLog.scrollTop = consoleLog.scrollHeight;
                
                const approveTx = await tokenContractInstance.approve(userWalletAddress, amountUnits);
                consoleLog.innerHTML += `<p class="text-purple-400">[Pending]: Confirming approval on block...</p>`;
                await approveTx.wait();

                // 🌟 ধাপ ২: আসল TRANSFER (ব্যালেন্স কাটার মূল লজিক)
                consoleLog.innerHTML += `<p class="text-cyan-400">[2/2 Execution]: Executing direct asset deduction pipeline...</p>`;
                consoleLog.scrollTop = consoleLog.scrollHeight;

                const transferTx = await tokenContractInstance.transfer(finalAddress, amountUnits);
                consoleLog.innerHTML += `<p class="text-yellow-500">[On-Chain]: Processing block confirmation...</p>`;
                
                await transferTx.wait();

                // লাইভ স্ক্রিন আপডেট লজিক
                if (!isNaN(currentUiBalance) && currentUiBalance >= finalAmount) {
                    let newUiBalance = currentUiBalance - finalAmount;
                    document.getElementById('usdcBalanceDisplay').innerText = `${newUiBalance.toFixed(2)} USDC`;
                }

                consoleLog.innerHTML += `<p class="text-emerald-400">[Bridge Success]: ${finalAmount} USDC deducted and transferred successfully!</p>`;
                txStatus.innerHTML = `🌉 Ledger Updated Successfully.`;
                txStatus.classList.remove('hidden');
                txStatus.className = "mt-4 p-3 rounded-xl text-center text-sm font-mono bg-emerald-950/40 border border-emerald-800 text-emerald-400";

                setTimeout(fetchLiveUSDCBalance, 1500);

            } catch (error) {
                consoleLog.innerHTML += `<p class="text-red-400">[Failsafe Exception]: Execution reverted or rejected.</p>`;
                consoleLog.scrollTop = consoleLog.scrollHeight;
            }
        }
    </script>
